pattern_name: abnormalMorphologyOfPartOfCellularComponent
pattern_iri: http://purl.obolibrary.org/obo/upheno/patterns-dev/abnormalMorphologyOfPartOfCellularComponent.yaml
description: "An abnormality in the morphology of a cellular component or any part of a cellular component, using this pattern abnormal synaptic vesicle morphology would be inferred to be a child of abnormal synapse morphology."

contributors:
  - https://orcid.org/0000-0001-5208-3432
  
classes:
  morphology: PATO:0000051
  abnormal: PATO:0000460
  cellular component: GO:0005575

relations: 
  characteristic_of_part_of: RO:0002314
  has_modifier: RO:0002573
  has_part: BFO:0000051

annotationProperties:
  narrow_synonym: oio:hasNarrowSynonym 

vars:
  cellular_component: "'cellular component'"

name:
  text: "abnormal %s morphology"
  vars:
   - cellular_component

annotations:
  - annotationProperty: narrow_synonym
    text: "abnormal shape of %s"
    vars:
     - cellular_component    

def:
  text: "Any structural anomaly of the %s."
  vars:
    - cellular_component

equivalentTo:
  text: "'has_part' some ('morphology' and ('characteristic_of_part_of' some %s) and ('has_modifier' some 'abnormal'))"
  vars:
    - cellular_component
